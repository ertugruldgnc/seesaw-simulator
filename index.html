<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="icon" href="data:;base64,iVBORw0KGgo=">
        <title>Seesaw</title>
    </head>
    <body>
        <header>
            <h1 id="projectName">Seesaw Simulation</h1>
        </header>
        <main id="mainContent">
            <section id="statsContainer">
                <article class="statCard" id="leftSideWeight">
                    <h3>Left Weight</h3>
                    <p>0 kg</p>
                </article>
                <article class="statCard" id="rightSideWeight">
                    <h3>Right Weight</h3>
                    <p>0 kg</p>
                </article>
                <article class="statCard" id="nextWeight">
                    <h3>Next Weight</h3>
                    <p>0 kg</p>
                </article>
                <article class="statCard" id="angle">
                    <h3>Angle</h3>
                    <p>0°</p>
                </article>
            </section>
            <section id="seesaw">
                <div id="beam"></div>
                <div id="fulcrum"></div>
            </section>
            <section>
                <button id="resetBtn" class="buttons">Reset</button>
                <button id="muteBtn" class="buttons">Mute</button>
            </section>
            <section id="actionsContainer">
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
